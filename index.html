<!DOCTYPE html>
<html>
<head>
<title>Получить комплимент 💌</title>

<style>
body{
    font-family: Arial;
    text-align: center;
    margin-top: 100px;
    background: #f8efe7;
}

button{
    padding: 15px 30px;
    font-size: 20px;
    background: #e8cfc0;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

#compliment{
    margin-top: 30px;
    font-size: 24px;
}
</style>

</head>

<body>

<h1>Нажми кнопку и получи комплимент ✨</h1>

<button onclick="giveCompliment()">Получить</button>

<div id="compliment"></div>

<script>

let compliments = [
"Ты сегодня выглядишь потрясающе",
"Ты очень умный человек",
"У тебя отличный вкус",
"Ты делаешь этот мир немного лучше",
"Ты очень харизматичный человек",
"Твоя улыбка реально поднимает настроение",
"Ты сильнее чем думаешь",
"Ты заслуживаешь всего самого хорошего"
];

function giveCompliment(){
let random = compliments[Math.floor(Math.random()*compliments.length)];
document.getElementById("compliment").innerText = random;
}

</script>

</body>
</html>
