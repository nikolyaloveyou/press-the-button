<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>маленькое послание</title>

<style>
body{
background:#f6e9ec;
font-family:Arial;
text-align:center;
padding-top:100px;
}

button{
display:block;
margin:15px auto;
padding:15px 25px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
}

#result{
margin-top:40px;
font-size:22px;
}
</style>

</head>

<body>

<h1>нажми кнопку ✨</h1>

<button onclick="compliment()">комплимент</button>
<button onclick="fate()">знак судьбы</button>
<button onclick="support()">поддержка</button>

<div id="result"></div>

<script>

const compliments = [
"ты сегодня выглядишь потрясающе",
"у тебя очень красивая энергия",
"ты сильнее чем думаешь"
];

const fates = [
"скоро случится что-то хорошее",
"ты на правильном пути",
"доверься процессу"
];

const supports = [
"ты справишься",
"можно отдохнуть",
"ты делаешь достаточно"
];

function compliment(){
let text = compliments[Math.floor(Math.random()*compliments.length)];
document.getElementById("result").innerText = text;
}

function fate(){
let text = fates[Math.floor(Math.random()*fates.length)];
document.getElementById("result").innerText = text;
}

function support(){
let text = supports[Math.floor(Math.random()*supports.length)];
document.getElementById("result").innerText = text;
}

</script>

</body>
</html>
